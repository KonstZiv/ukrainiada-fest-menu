# ---------------------------------------------------------------------------
# CI Pipeline (GitHub Actions)
#
# Jobs:
#   validate-po   — msgfmt --check on all .po files (no Python, ~10s)
#   code-quality  — ruff lint/format + mypy (one uv sync, cached)
#   pytest        — tests with PostgreSQL service (cached)
#   ai-review     — Gemini review on PRs only (after all checks pass)
#
# Required secrets:
#   CI_DB_PASSWORD  — password for the PostgreSQL service container
#   SECRET_KEY      — Django secret key (any random string)
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  DJANGO_SETTINGS_MODULE: core_settings.settings.ci
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  validate-po:
    name: Validate .po files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          for f in locale/*/LC_MESSAGES/*.po; do
            echo "Checking $f"
            msgfmt --check "$f" -o /dev/null
          done

  code-quality:
    name: Code quality (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: festival_menu
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run pytest --cov=menu --cov=user --cov-report=term-missing

  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request'
    needs: [validate-po, code-quality, pytest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: KonstZiv/ai-code-reviewer@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          google_api_key: ${{ secrets.AI_REVIEWER_GOOGLE_API_KEY }}
          language: uk
