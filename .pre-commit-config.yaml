repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
      - id: validate-po
        name: validate .po files
        entry: bash -c 'for f in locale/*/LC_MESSAGES/*.po; do msgfmt --check "$f" -o /dev/null || exit 1; done'
        language: system
        files: '\.po$'
        pass_filenames: false
