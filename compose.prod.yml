# Production Docker Compose — ukrainiada festival menu system.
#
# Requires .env file with production secrets (see .env.example).
#
# Usage:
#   docker compose -f compose.prod.yml up -d
#   docker compose -f compose.prod.yml logs -f

services:
  web:
    image: ghcr.io/konstziv/ukrainiada-fest-menu:latest
    container_name: fest-web
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core_settings.settings.prod
    volumes:
      - static:/app/static_collected
      - media:/app/media
      - logs:/app/logs
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             uvicorn core_settings.asgi:application --host 0.0.0.0 --port 8000 --workers 3 --lifespan off"
    networks:
      - default
      - shared-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:18-alpine
    container_name: fest-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Hardened connection limits:
    #   max_connections=200  — headroom for festival peak load
    #   idle_session_timeout=5min — PostgreSQL kills idle connections automatically
    #   idle_in_transaction_session_timeout=2min — kills abandoned transactions
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - idle_session_timeout=300000
      - -c
      - idle_in_transaction_session_timeout=120000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: fest-pgbouncer
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      # Transaction pooling: connection assigned only during transaction,
      # returned to pool between queries.  Supports hundreds of Django
      # connections through ~25 real PostgreSQL connections.
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 25
      MAX_CLIENT_CONN: 400
      MAX_DB_CONNECTIONS: 50
      # plain auth: PgBouncer stores password as-is, negotiates
      # scram-sha-256 with PostgreSQL 18 automatically.
      AUTH_TYPE: plain
      # Logging
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: fest-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    image: ghcr.io/konstziv/ukrainiada-fest-menu:latest
    container_name: fest-celery-worker
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core_settings.settings.prod
    volumes:
      - logs:/app/logs
    command: >
      celery -A core_settings worker -l info --concurrency=2
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A core_settings inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    image: ghcr.io/konstziv/ukrainiada-fest-menu:latest
    container_name: fest-celery-beat
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core_settings.settings.prod
    command: >
      celery -A core_settings beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[c]elery beat'"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  static:
  media:
  logs:

networks:
  shared-net:
    external: true
