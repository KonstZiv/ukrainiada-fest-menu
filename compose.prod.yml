# Production Docker Compose — ukrainiada festival menu system.
#
# Requires .env file with production secrets (see .env.example).
#
# Usage:
#   docker compose -f compose.prod.yml up -d
#   docker compose -f compose.prod.yml logs -f

services:
  web:
    image: ghcr.io/konstziv/ukrainiada-fest-menu:latest
    container_name: fest-web
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core_settings.settings.prod
    volumes:
      - static:/app/static_collected
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             uvicorn core_settings.asgi:application
             --host 0.0.0.0 --port 8000
             --workers 3 --lifespan off"
    networks:
      - default
      - shared-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:18-alpine
    container_name: fest-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: fest-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    image: ghcr.io/konstziv/ukrainiada-fest-menu:latest
    container_name: fest-celery-worker
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core_settings.settings.prod
    command: >
      celery -A core_settings worker -l info --concurrency=2
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A core_settings inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    image: ghcr.io/konstziv/ukrainiada-fest-menu:latest
    container_name: fest-celery-beat
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core_settings.settings.prod
    command: >
      celery -A core_settings beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[c]elery beat'"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  static:
  media:

networks:
  shared-net:
    external: true
