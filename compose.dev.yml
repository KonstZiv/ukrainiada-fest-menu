# Development infrastructure — PostgreSQL + Redis only.
# Django, Celery worker/beat run locally via uv run.
#
# Requires .env-dev with DB_NAME, DB_USER, DB_PASSWORD.
#
# Usage:
#   docker compose -f compose.dev.yml --env-file .env-dev up -d
#   uv run python manage.py runserver

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
