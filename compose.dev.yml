# Development — all services in containers, code mounted from host.
#
# Usage:
#   docker compose -f compose.dev.yml --env-file .env-dev up -d
#   docker compose -f compose.dev.yml --env-file .env-dev logs -f web
#
# Django dev server at http://localhost:8001
# Code changes auto-reload (runserver watches mounted volume).

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      uv run uvicorn core_settings.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - dev_venv:/app/.venv
    env_file:
      - .env-dev
    environment:
      - DJANGO_SETTINGS_MODULE=core_settings.settings.dev
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      uv run celery -A core_settings worker
      --loglevel=info
      --concurrency=2
    volumes:
      - .:/app
      - dev_venv:/app/.venv
    env_file:
      - .env-dev
    environment:
      - DJANGO_SETTINGS_MODULE=core_settings.settings.dev
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      uv run celery -A core_settings beat
      --loglevel=info
    volumes:
      - .:/app
      - dev_venv:/app/.venv
    env_file:
      - .env-dev
    environment:
      - DJANGO_SETTINGS_MODULE=core_settings.settings.dev
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  dev_venv:
