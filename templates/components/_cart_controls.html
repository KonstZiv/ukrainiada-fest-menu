{% load menu_extras %}
{# Cart add/decrease controls for a single dish. Context: dish (Dish object) #}
{% with qty=cart_quantities|dict_get:dish.id %}
<div class="d-inline-flex align-items-center gap-1">
  {% if qty %}
    <form method="post" action="{% url 'orders:cart_decrease' dish.id %}" class="d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-danger btn-sm rounded-circle p-0"
              style="width: 28px; height: 28px;">
        <i class="bi bi-dash"></i>
      </button>
    </form>
    <span class="fw-bold" style="min-width: 1.25rem; text-align: center;">{{ qty }}</span>
  {% endif %}
  <form method="post" action="{% url 'orders:cart_add' %}" class="d-inline">
    {% csrf_token %}
    <input type="hidden" name="dish_id" value="{{ dish.id }}">
    <input type="hidden" name="quantity" value="1">
    <button type="submit" class="btn btn-outline-primary btn-sm rounded-circle p-0"
            style="width: 28px; height: 28px;">
      <i class="bi bi-plus"></i>
    </button>
  </form>
</div>
{% endwith %}
